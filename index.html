<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Palenque - Menú</title>
    <style>
        :root { --primary: #FCB813; --accent-fire: #FF4500; --accent-red: #E62427; --dark: #0A0A0A; --card-bg: rgba(22, 22, 22, 0.95); --text-light: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: var(--dark); color: var(--text-light); padding-bottom: 110px; }
        header { text-align: center; padding: 30px; border-bottom: 3px solid var(--accent-fire); }
        .logo-img { max-width: 120px; border-radius: 50%; border: 2px solid var(--accent-fire); margin-bottom: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .category-banner { width: 100%; height: 80px; background-size: cover; background-position: center; border-radius: 8px; margin-top: 20px; display: flex; align-items: center; padding-left: 15px; color: var(--primary); font-weight: bold; border: 1px solid var(--accent-fire); }
        .category-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .product-card { background: var(--card-bg); padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .product-img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; }
        .product-info h3 { font-size: 0.9rem; margin: 5px 0; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .price { color: var(--primary); font-weight: bold; }
        .controls { display: flex; gap: 5px; align-items: center; }
        .btn-qty { background: var(--accent-red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--accent-fire); max-width: 600px; margin: auto; }
        .btn-send { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <img src="logo.JPEG" alt="Logo" class="logo-img">
        <h1>EL PALENQUE</h1>
    </header>

    <div class="container">
        <!-- COMBOS -->
        <div class="category-banner" style="background-image: url('https://i.imgur.com/vHwZ4oK.jpeg');"><h2>⚡ SÚPER COMBOS</h2></div>
        <div class="category-group">
            <div class="product-card" data-name="Combo 1" data-price="160"><img class="product-img" src="https://i.imgur.com/39wFv7m.jpeg"><div class="product-info"><h3>Combo 1</h3></div><div class="price-row"><span class="price">$160</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Combo 2" data-price="220"><img class="product-img" src="https://i.imgur.com/UunGvFw.jpeg"><div class="product-info"><h3>Combo 2</h3></div><div class="price-row"><span class="price">$220</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Combo 3" data-price="230"><img class="product-img" src="https://i.imgur.com/fL39mUo.jpeg"><div class="product-info"><h3>Combo 3</h3></div><div class="price-row"><span class="price">$230</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Combo 4" data-price="270"><img class="product-img" src="https://i.imgur.com/n6bYvS0.jpeg"><div class="product-info"><h3>Combo 4</h3></div><div class="price-row"><span class="price">$270</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
        </div>

        <!-- HAMBURGUESAS -->
        <div class="category-banner" style="background-image: url('https://i.imgur.com/e8r609I.jpeg');"><h2>🍔 HAMBURGUESAS Y APERITIVOS</h2></div>
        <div class="category-group">
            <div class="product-card" data-name="Hamburguesa Doble" data-price="100"><img class="product-img" src="https://i.imgur.com/nfeNpxZ.jpeg"><div class="product-info"><h3>Doble Carne</h3></div><div class="price-row"><span class="price">$100</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Hamburguesa Clásica" data-price="75"><img class="product-img" src="https://i.imgur.com/e8r609I.jpeg"><div class="product-info"><h3>Clásica</h3></div><div class="price-row"><span class="price">$75</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Hotdog" data-price="35"><img class="product-img" src="https://i.imgur.com/vHqgS0B.jpeg"><div class="product-info"><h3>Hotdog</h3></div><div class="price-row"><span class="price">$35</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Papas" data-price="50"><img class="product-img" src="https://i.imgur.com/N6g9zre.jpeg"><div class="product-info"><h3>Papas</h3></div><div class="price-row"><span class="price">$50</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
        </div>

        <!-- BEBIDAS (LOCALES) -->
        <div class="category-banner" style="background-image: url('cubetazo-cerveza.JPEG');"><h2>🍺 BEBIDAS Y BARRA</h2></div>
        <div class="category-group">
            <div class="product-card" data-name="Cubetazo" data-price="150"><img class="product-img" src="cubetazo-cerveza.JPEG"><div class="product-info"><h3>Cubetazo</h3></div><div class="price-row"><span class="price">$150</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
            <div class="product-card" data-name="Michelada" data-price="100"><img class="product-img" src="michelada-mexicana.JPEG"><div class="product-info"><h3>Michelada</h3></div><div class="price-row"><span class="price">$100</span><div class="controls"><button class="btn-qty" onclick="changeQty(this, -1)">-</button><span class="qty">0</span><button class="btn-qty" onclick="changeQty(this, 1)">+</button></div></div></div>
        </div>
    </div>

    <div class="cart-bar">
        <div id="total">Total: $0</div>
        <button class="btn-send" onclick="enviar()">Enviar Pedido</button>
    </div>

    <script>
        function changeQty(btn, val) {
            let qtySpan = btn.parentElement.querySelector('.qty');
            let q = parseInt(qtySpan.innerText) + val;
            qtySpan.innerText = q < 0 ? 0 : q;
            updateTotal();
        }
        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.product-card').forEach(card => {
                let q = parseInt(card.querySelector('.qty').innerText);
                let p = parseInt(card.getAttribute('data-price'));
                total += (q * p);
            });
            document.getElementById('total').innerText = 'Total: $' + total;
        }
        function enviar() {
            let msg = "Pedido El Palenque:%0A";
            document.querySelectorAll('.product-card').forEach(c => {
                let q = c.querySelector('.qty').innerText;
                if(q > 0) msg += q + "x " + c.getAttribute('data-name') + "%0A";
            });
            window.open("https://wa.me/529221963473?text=" + msg);
        }
    </script>
</body>
</html>
